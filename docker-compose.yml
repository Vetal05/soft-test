services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsagg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      SEED_LARGE: "1"
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=newsagg;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  k6:
    image: grafana/k6:0.52.0
    profiles: [k6]
    entrypoint: ["k6"]
    command: ["run", "/scripts/articles_feed.js"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      BASE_URL: http://api:8080
    volumes:
      - ./perf/k6:/scripts:ro
